<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">
<title>Mac Doker</title>
<style>
/* ============ base ============ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--bg-card:rgba(255,255,255,.08);--bg-card-hover:rgba(255,255,255,.15);--bg-input:rgba(255,255,255,.06);--text-primary:#e8e8e8;--text-secondary:#a0a0b0;--accent:#4fc3f7;--accent-hover:#29b6f6;--danger:#ef5350;--warning:#ffa726;--pin-color:#ffd700;--border:rgba(255,255,255,.1);--shadow-card:0 4px 24px rgba(0,0,0,.3);--shadow-hover:0 0 20px rgba(79,195,247,.15);--radius-sm:10px;--radius-md:16px}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,var(--bg-primary) 0%,var(--bg-secondary) 50%,#0a1628 100%);color:var(--text-primary);min-height:100vh;overflow-x:hidden;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(79,195,247,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(129,212,250,.06) 0%,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.25)}
::selection{background:rgba(79,195,247,.3);color:#fff}

/* ============ layout ============ */
.app-container{position:relative;z-index:1;padding:20px;max-width:1400px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;margin-bottom:20px;background:var(--bg-card);backdrop-filter:blur(20px);border-radius:var(--radius-md);border:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#4fc3f7,#81d4fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header h1 span{-webkit-text-fill-color:initial}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:24px;padding:8px 16px;width:300px;transition:all .3s}
.search-box:focus-within{border-color:var(--accent);background:rgba(79,195,247,.08)}
.search-box input{background:none;border:none;outline:none;color:var(--text-primary);font-size:14px;width:100%}
.search-box input::placeholder{color:var(--text-secondary)}
.search-clear{background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;padding:0 4px;display:none}
.search-box.has-value .search-clear{display:block}
.header-actions{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:13px;transition:all .15s;white-space:nowrap;outline:none;font-family:inherit}
.btn:hover{background:var(--bg-card-hover);border-color:var(--accent)}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#4fc3f7,#42a5f5);border:none;color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,#29b6f6,#1e88e5)}
.btn-danger{background:var(--danger);border:none;color:#fff}
.view-toggle{display:flex;gap:4px}
.view-btn{padding:6px 10px;border-radius:8px;cursor:pointer;font-size:14px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);transition:all .2s}
.view-btn:hover,.view-btn.active{color:var(--accent);border-color:var(--accent)}

/* ============ category tabs ============ */
.category-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;padding:0 4px}
.tab{padding:8px 18px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);position:relative}
.tab:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab .count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;font-size:11px;font-weight:600;margin-left:6px;background:rgba(255,255,255,.15)}
.tab.active .count{background:rgba(255,255,255,.3)}
.tab-add{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;padding:0}

/* ============ sort bar ============ */
.sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.sort-bar span{font-size:12px;color:var(--text-secondary)}
.sort-options{display:flex;gap:4px}
.sort-btn{padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer;background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);transition:all .2s;outline:none;font-family:inherit}
.sort-btn:hover,.sort-btn.active{color:var(--accent);border-color:var(--accent)}

/* ============ app grid ============ */
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:16px;padding:4px;min-height:400px}
.app-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 10px 12px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);cursor:pointer;transition:all .25s ease;position:relative;user-select:none;-webkit-user-drag:element}
.app-card:hover{transform:translateY(-4px) scale(1.03);background:var(--bg-card-hover);box-shadow:var(--shadow-card),var(--shadow-hover);border-color:rgba(79,195,247,.3)}
.app-card:active{transform:translateY(-2px) scale(.99)}
.app-card.dragging{opacity:.5;transform:scale(.95)}
.app-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.app-card.pinned .app-pin{opacity:1;color:var(--pin-color)}
.app-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:transform .15s}
.app-card:hover .app-icon{transform:scale(1.05)}
.app-name{font-size:11px;text-align:center;color:var(--text-secondary);line-height:1.3;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.app-card:hover .app-name{color:var(--text-primary)}
.app-pin{position:absolute;top:6px;right:6px;font-size:10px;opacity:0;transition:opacity .2s}
.app-card:hover .app-pin{opacity:.7}
.app-usage-badge{position:absolute;bottom:4px;right:6px;font-size:9px;background:rgba(255,152,0,.8);color:#fff;padding:1px 5px;border-radius:8px;font-weight:600;line-height:1.3}

/* view modes */
.app-grid.view-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:20px}
.app-grid.view-grid .app-icon{width:64px;height:64px;font-size:32px;border-radius:16px}
.app-grid.view-grid .app-name{font-size:12px}
.app-grid.view-compact{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.app-grid.view-compact .app-card{flex-direction:row;padding:10px 14px}
.app-grid.view-compact .app-icon{width:36px;height:36px;font-size:18px;border-radius:8px}
.app-grid.view-compact .app-name{max-width:140px;font-size:13px;text-align:left}
.app-grid.view-compact .app-pin{position:static;font-size:12px;opacity:1;margin-left:auto}

/* ============ empty state ============ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-secondary);grid-column:1/-1}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:14px}

/* ============ context menu ============ */
.context-menu{position:fixed;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 0;min-width:180px;box-shadow:var(--shadow-card);z-index:100;display:none;animation:fadeIn .15s ease}
.context-menu.show{display:block}
.context-item{padding:8px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;transition:background .15s}
.context-item:hover{background:var(--bg-card-hover)}
.context-divider{height:1px;background:var(--border);margin:4px 0}

/* ============ notification ============ */
.notification{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-secondary);border:1px solid var(--accent);padding:10px 24px;border-radius:24px;font-size:13px;box-shadow:var(--shadow-card);z-index:200;display:none;animation:slideUp .3s ease}
.notification.show{display:block}

/* ============ modal ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:150;animation:fadeIn .2s ease}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:24px;width:90%;max-width:500px;box-shadow:var(--shadow-card);animation:slideUp .25s ease}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h2{font-size:18px}
.modal-close{background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s}
.modal-close:hover{background:var(--bg-card);color:var(--text-primary)}
.modal-body{margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end}

/* settings */
.setting-group{margin-bottom:16px}
.setting-label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px}
.setting-input,.setting-select{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-input);color:var(--text-primary);font-size:14px;outline:none;font-family:inherit;transition:border-color .15s}
.setting-input:focus,.setting-select:focus{border-color:var(--accent)}
.setting-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px}
.setting-toggle input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}
.setting-actions{display:flex;gap:8px;flex-wrap:wrap}

/* color options */
.color-options{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;display:inline-block}
.color-opt:hover,.color-opt.selected{border-color:#fff;transform:scale(1.15)}
.color-blue{background:linear-gradient(135deg,#42a5f5,#1e88e5)}
.color-green{background:linear-gradient(135deg,#66bb6a,#43a047)}
.color-red{background:linear-gradient(135deg,#ef5350,#e53935)}
.color-orange{background:linear-gradient(135deg,#ffa726,#fb8c00)}
.color-purple{background:linear-gradient(135deg,#ab47bc,#8e24aa)}
.color-pink{background:linear-gradient(135deg,#ec407a,#d81b60)}
.color-teal{background:linear-gradient(135deg,#26a69a,#00897b)}
.color-indigo{background:linear-gradient(135deg,#5c6bc0,#3949ab)}
.color-yellow{background:linear-gradient(135deg,#ffee58,#fdd835)}
.color-cyan{background:linear-gradient(135deg,#26c6da,#00acc1)}

/* ============ animations ============ */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}

.app-card{animation:popIn .3s ease both}
.app-card:nth-child(1){animation-delay:.02s}.app-card:nth-child(2){animation-delay:.04s}.app-card:nth-child(3){animation-delay:.06s}
.app-card:nth-child(4){animation-delay:.08s}.app-card:nth-child(5){animation-delay:.1s}.app-card:nth-child(6){animation-delay:.12s}
.app-card:nth-child(7){animation-delay:.14s}.app-card:nth-child(8){animation-delay:.16s}.app-card:nth-child(9){animation-delay:.18s}.app-card:nth-child(10){animation-delay:.2s}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="header-left"><h1><span>🚀</span> Mac Doker</h1></div>
    <div class="search-box" id="searchBox">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="搜索应用... (按 / 快速聚焦)" autocomplete="off">
      <button class="search-clear" id="searchClear">×</button>
    </div>
    <div class="header-actions">
      <div class="view-toggle">
        <button class="view-btn active" data-view="default" title="默认">⊞</button>
        <button class="view-btn" data-view="grid" title="大图标">⊟</button>
        <button class="view-btn" data-view="compact" title="紧凑">☰</button>
      </div>
      <button class="btn" id="btnAddCategory">＋ 分类</button>
      <button class="btn btn-primary" id="btnScanApps">⟳ 刷新</button>
      <button class="btn" id="btnSettings">⚙</button>
    </div>
  </div>
  <div class="category-tabs" id="categoryTabs"></div>
  <div class="sort-bar">
    <span id="appCount">共 0 个应用</span>
    <div class="sort-options">
      <button class="sort-btn active" data-sort="name">按名称</button>
      <button class="sort-btn" data-sort="category">按分类</button>
      <button class="sort-btn" data-sort="pinned">⭐ 收藏</button>
      <button class="sort-btn" data-sort="usage">🔥 频次</button>
    </div>
  </div>
  <div class="app-grid" id="appGrid"></div>
</div>

<div class="context-menu" id="contextMenu">
  <div class="context-item" data-action="open">🚀 打开应用</div>
  <div class="context-item" data-action="pin">⭐ 收藏/取消</div>
  <div class="context-item" data-action="edit">✏️ 编辑</div>
  <div class="context-item" data-action="resetUsage">🔥 重置频次</div>
  <div class="context-divider"></div>
  <div class="context-item" data-action="delete" style="color:var(--danger)">🗑️ 移除</div>
</div>
<div class="notification" id="notification"></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header"><h2>⚙ 设置</h2><button class="modal-close" data-close="settingsModal">×</button></div>
    <div class="modal-body">
      <div class="setting-group">
        <label class="setting-label">默认视图</label>
        <select id="settingViewMode" class="setting-select"><option value="default">默认</option><option value="grid">大图标</option><option value="compact">紧凑列表</option></select>
      </div>
      <div class="setting-group">
        <label class="setting-label">默认排序</label>
        <select id="settingSortBy" class="setting-select"><option value="name">按名称</option><option value="usage">按使用频次</option><option value="pinned">收藏优先</option><option value="category">按分类</option></select>
      </div>
      <div class="setting-group"><label class="setting-toggle"><input type="checkbox" id="settingMinimizeToTray" checked> 关闭时最小化到托盘</label></div>
      <div class="setting-group"><label class="setting-label">数据管理</label><div class="setting-actions"><button class="btn btn-danger" id="btnClearData">🗑️ 清除所有数据</button></div></div>
    </div>
    <div class="modal-footer"><button class="btn" data-close="settingsModal">取消</button><button class="btn btn-primary" id="btnSaveSettings">保存</button></div>
  </div>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="addCategoryModal">
  <div class="modal">
    <div class="modal-header"><h2 id="catModalTitle">✨ 新建分类</h2><button class="modal-close" data-close="addCategoryModal">×</button></div>
    <div class="modal-body">
      <div class="setting-group"><label class="setting-label">分类名称</label><input type="text" class="setting-input" id="categoryName" placeholder="输入名称..." maxlength="20"></div>
      <div class="setting-group"><label class="setting-label">颜色</label><div class="color-options" id="colorOptions">
        <span class="color-opt color-blue selected" data-color="blue"></span><span class="color-opt color-green" data-color="green"></span><span class="color-opt color-red" data-color="red"></span><span class="color-opt color-orange" data-color="orange"></span><span class="color-opt color-purple" data-color="purple"></span><span class="color-opt color-pink" data-color="pink"></span><span class="color-opt color-teal" data-color="teal"></span><span class="color-opt color-indigo" data-color="indigo"></span><span class="color-opt color-yellow" data-color="yellow"></span><span class="color-opt color-cyan" data-color="cyan"></span>
      </div></div>
    </div>
    <div class="modal-footer"><input type="hidden" id="editingCategoryId"><button class="btn" data-close="addCategoryModal">取消</button><button class="btn btn-primary" id="btnConfirmCategory">创建</button></div>
  </div>
</div>

<script>
/* =====================================================
   Mac Doker - Renderer JavaScript (All-in-one)
   ===================================================== */

// ====== State ======
const ICON_MAP = {
  '360':'📦','360':'🌐','Adobe':'🎨','Illustrator':'🖌️','Photoshop':'🎨','Android':'🤖','Baidu':'️','CloudVideo':'🎬','Cursor':'💻','Doubao':'🤖','Ecloud':'☁️','GarageBand':'🎵','Chrome':'🌐','Lark':'💬','MagicHut':'🎭','MailMaster':'📧','Midjourney':'🤖','Music':'🎵','QQ':'💬','Quark':'🌐','Safari':'🧭','Steam':'🎮','TencentMeeting':'','TencentDocs':'📄','ToDesk':'️','WeChat':'💬','Xcode':'🛠️','ima':'🤖','wpsoffice':'📝','云空间':'☁️','小丑牌':'🃏','小米':'📱','微信读书':'📖','有道':'📝','移动办公':'💼','WorkBuddy':'🔧','pixcake':'🍰','云':'☁️'
};
const CATEGORY_MAP = {
  'Xcode':'dev','Android':'dev','Cursor':'dev','TRAE':'dev',
  'WeChat':'communication','Lark':'communication','QQ':'communication','TencentMeeting':'communication','钉钉':'communication',
  'Doubao':'ai','Midjourney':'ai','ima':'ai','pixcake':'ai','WorkBuddy':'ai',
  'Adobe':'media','Photoshop':'media','Illustrator':'media','Lightroom':'media','GarageBand':'media','VideoFusion':'media',
  'Chrome':'system','Safari':'system','360':'system','Quark':'system',
  'Steam':'entertainment','小丑牌':'entertainment','Music':'entertainment','云空间':'entertainment',
  'wpsoffice':'office','TencentDocs':'office','MailMaster':'office','有道':'office','移动办公':'office',
  '360':'system','ToDesk':'system','云':'office','小米':'system'
};
const COLOR_LIST = ['blue','green','red','orange','purple','pink','teal','indigo','yellow','cyan'];

let state = { apps:[], categories:[], activeCategory:'all', sortBy:'name', viewMode:'default', searchQuery:'', draggedApp:null };
const DEFAULT_CATS = [
  {id:'all',name:'全部',color:'blue',isSystem:true},{id:'pinned',name:'⭐ 收藏',color:'yellow',isSystem:true},
  {id:'dev',name:'开发工具',color:'blue'},{id:'office',name:'办公效率',color:'green'},
  {id:'communication',name:'沟通协作',color:'teal'},{id:'entertainment',name:'娱乐休闲',color:'purple'},
  {id:'ai',name:'AI 工具',color:'pink'},{id:'media',name:'媒体创作',color:'orange'},
  {id:'system',name:'系统工具',color:'indigo'},{id:'other',name:'其他',color:'cyan'}
];

function getIcon(name){for(const k in ICON_MAP)if(name.includes(k))return ICON_MAP[k];return '📱'}
function guessCat(name){for(const k in CATEGORY_MAP)if(name.includes(k))return CATEGORY_MAP[k];return 'other'}

// ====== IPC Bridge ======
const API = window.macDokerAPI || null;

// ====== Storage ======
function saveState(){
  try{localStorage.setItem('macDokerState',JSON.stringify({apps:state.apps.map(a=>({name:a.name,category:a.category,pinned:a.pinned,usageCount:a.usageCount||0})),categories:state.categories,activeCategory:state.activeCategory,sortBy:state.sortBy,viewMode:state.viewMode}));}catch(e){}
  if(API){API.saveData('appState',{apps:state.apps.map(a=>({name:a.name,category:a.category,pinned:a.pinned,usageCount:a.usageCount||0})),categories:state.categories,activeCategory:state.activeCategory,sortBy:state.sortBy,viewMode:state.viewMode});}
}
function loadState(){
  try{
    const raw=localStorage.getItem('macDokerState');
    if(raw){const s=JSON.parse(raw);if(s.categories)state.categories=s.categories;if(s.activeCategory)state.activeCategory=s.activeCategory;if(s.sortBy)state.sortBy=s.sortBy;if(s.viewMode)state.viewMode=s.viewMode;if(s.apps)state.apps=s.apps.map(a=>({...a,emoji:getIcon(a.name),color:COLOR_LIST[Math.abs(a.name.split('').reduce((x,c)=>x+c.charCodeAt(0),0))%COLOR_LIST.length]}));}
  }catch(e){}
}

// ====== App Scan ======
async function scanApps(){
  notify('⏳ 正在扫描应用...');
  let apps=[];
  if(API){
    try{const res=await API.scanApps();if(res.success&&res.data)apps=res.data;}catch(e){}
  }
  if(!apps.length){
    // Fallback: pre-populate from known list
    const known=['360压缩大师','360极速浏览器','Adobe Creative Cloud','Adobe Illustrator 2025','Adobe Lightroom Classic','Adobe Photoshop 2026','Android Studio','BaiduNetdisk','CloudVideo','Cursor','Digital Film Tools','Doubao','Ecloud Cloud Computer Application','Exposure Software','Exposure X7','GarageBand','Google Chrome','Lark','MagicHut','MailMaster','Midjourney','NeteaseMusic','QQ','Quark','Safari','SogouInputSwitchHelper','Steam','TOS Browser','TRAE SOLO CN','TencentDocs','TencentMeeting','ToDesk','UUBooster','Utilities','VideoFusion-macOS','WeChat','WorkBuddy','Xcode','YunShixun','ima.copilot','pixcake','wpsoffice','云空间','小丑牌','小米互联服务','微信读书','有道云笔记','汽水音乐','移动办公'];
    apps=known.map(n=>({name:n,path:null,icon:null,size:0,lastModified:0}));
  }
  const savedApps=new Map((state.apps||[]).map(a=>[a.name,a]));
  state.apps=apps.map(a=>{
    const s=savedApps.get(a.name);
    return{name:a.name,path:a.path,category:s?s.category:guessCat(a.name),pinned:s?s.pinned:false,usageCount:s?s.usageCount||0:0,emoji:getIcon(a.name),color:COLOR_LIST[Math.abs(a.name.split('').reduce((x,c)=>x+c.charCodeAt(0),0))%COLOR_LIST.length]};
  });
  saveState();
  notify(`✅ 已扫描 ${state.apps.length} 个应用`);
}

// ====== Launch App ======
async function launchApp(name){
  notify(`🚀 正在打开 ${name}...`);
  incrementUsage(name);
  if(API){try{await API.launchApp(name);}catch(e){}}
}

function incrementUsage(name){
  const app=state.apps.find(a=>a.name===name);if(!app)return;app.usageCount=(app.usageCount||0)+1;saveState();renderApps();
}

// ====== Render Tabs ======
function renderTabs(){
  const el=document.getElementById('categoryTabs');if(!el)return;
  const counts={};state.apps.forEach(a=>{counts[a.category]=(counts[a.category]||0)+1});
  counts['all']=state.apps.length;counts['pinned']=state.apps.filter(a=>a.pinned).length;
  const cats=state.categories.length?state.categories:[...DEFAULT_CATS];
  if(!state.categories.length)state.categories=cats;
  el.innerHTML=cats.map(c=>{
    const cnt=c.id==='all'?counts['all']:c.id==='pinned'?counts['pinned']:(counts[c.id]||0);
    return`<div class="tab ${state.activeCategory===c.id?'active':''}" data-cat="${c.id}">${c.name}<span class="count">${cnt}</span></div>`;
  }).join('')+'<div class="tab tab-add" title="新建分类">＋</div>';
  el.querySelectorAll('.tab[data-cat]').forEach(t=>t.onclick=()=>{state.activeCategory=t.dataset.cat;saveState();renderApps()});
  el.querySelector('.tab-add').onclick=()=>openCatModal();
}

// ====== Render Apps ======
function renderApps(){
  const el=document.getElementById('appGrid');if(!el)return;
  let apps=[...state.apps];
  if(state.activeCategory==='pinned')apps=apps.filter(a=>a.pinned);
  else if(state.activeCategory!=='all')apps=apps.filter(a=>a.category===state.activeCategory);
  if(state.searchQuery){const q=state.searchQuery.toLowerCase();apps=apps.filter(a=>a.name.toLowerCase().includes(q))}
  if(state.sortBy==='name')apps.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  else if(state.sortBy==='usage')apps.sort((a,b)=>(b.usageCount||0)-(a.usageCount||0)||a.name.localeCompare(b.name,'zh'));
  else if(state.sortBy==='pinned')apps.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||a.name.localeCompare(b.name,'zh'));
  else if(state.sortBy==='category')apps.sort((a,b)=>a.name.localeCompare(b.name,'zh'));
  document.getElementById('appCount').textContent=`共 ${apps.length} 个应用`;
  if(!apps.length){el.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="icon">${state.searchQuery?'🔍':'📂'}</div><p>${state.searchQuery?'未找到匹配':'此分类暂无应用'}</p></div>`;return}
  el.innerHTML=apps.map((app,i)=>`<div class="app-card ${app.pinned?'pinned':''}" data-name="${app.name}" draggable="true" style="animation-delay:${i*0.02}s"><span class="app-pin">${app.pinned?'⭐':''}</span><div class="app-icon color-${app.color}">${app.emoji}</div><div class="app-name" title="${app.name}">${app.name}</div>${app.usageCount?`<div class="app-usage-badge">${app.usageCount}</div>`:''}</div>`).join('');
  bindGridEvents(el);
}

// ====== Event Delegation for Grid ======
let clickTimer=null;
function bindGridEvents(grid){
  grid.onclick=e=>{const card=e.target.closest('.app-card');if(!card||e.detail!==1)return;const name=card.dataset.name;clearTimeout(clickTimer);clickTimer=setTimeout(()=>{if(!card.classList.contains('editing'))launchApp(name)},250)};
  grid.ondblclick=e=>{const card=e.target.closest('.app-card');if(!card)return;clearTimeout(clickTimer);editApp(card.dataset.name)};
  grid.oncontextmenu=e=>{const card=e.target.closest('.app-card');if(!card)return;e.preventDefault();e.stopPropagation();showContextMenu(e,card.dataset.name)};
  // drag-drop
  grid.querySelectorAll('.app-card').forEach(card=>{
    card.ondragstart=e=>{state.draggedApp=card.dataset.name;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move';};
    card.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='move'};
    card.ondragenter=e=>{e.preventDefault();const c=e.target.closest('.app-card');if(c)c.classList.add('drag-over')};
    card.ondragleave=e=>{const c=e.target.closest('.app-card');if(c)c.classList.remove('drag-over')};
    card.ondrop=e=>{e.preventDefault();const c=e.target.closest('.app-card');if(c)c.classList.remove('drag-over');const target=c?.dataset.name;if(state.draggedApp&&state.draggedApp!==target){const f=state.apps.findIndex(a=>a.name===state.draggedApp),t=state.apps.findIndex(a=>a.name===target);if(f>-1&&t>-1){const[m]=state.apps.splice(f,1);state.apps.splice(t,0,m);saveState();renderApps()}}state.draggedApp=null};
    card.ondragend=e=>{e.target.classList.remove('dragging');document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'))};
  });
}

// ====== Context Menu ======
const ctxMenu=document.getElementById('contextMenu');
function showContextMenu(e,name){
  ctxMenu.style.left=e.clientX+'px';ctxMenu.style.top=e.clientY+'px';ctxMenu.classList.add('show');ctxMenu.dataset.app=name;
  requestAnimationFrame(()=>{const r=ctxMenu.getBoundingClientRect();if(r.right>innerWidth-10)ctxMenu.style.left=(innerWidth-r.width-10)+'px';if(r.bottom>innerHeight-10)ctxMenu.style.top=(innerHeight-r.height-10)+'px'});
}
ctxMenu.querySelectorAll('.context-item').forEach(item=>{
  item.onclick=function(){
    const name=ctxMenu.dataset.app;const action=this.dataset.action;
    if(action==='open')launchApp(name);
    else if(action==='pin'){const app=state.apps.find(a=>a.name===name);if(app){app.pinned=!app.pinned;saveState();renderTabs();renderApps();notify(app.pinned?'⭐ 已收藏':'取消收藏')}};
    else if(action==='edit')editApp(name);
    else if(action==='resetUsage'){const app=state.apps.find(a=>a.name===name);if(app){app.usageCount=0;saveState();renderApps();notify('频次已重置')}};
    else if(action==='delete'){if(confirm(`确定移除 "${name}"？`)){state.apps=state.apps.filter(a=>a.name!==name);saveState();renderTabs();renderApps();notify('已移除')}};
    ctxMenu.classList.remove('show');
  }
});
document.addEventListener('click',()=>ctxMenu.classList.remove('show'));

// ====== Notification ======
const notifEl=document.getElementById('notification');
function notify(msg){notifEl.textContent=msg;notifEl.classList.add('show');setTimeout(()=>notifEl.classList.remove('show'),2000)}

// ====== Modals ======
function closeModal(id){document.getElementById(id).classList.remove('show')}
function openModal(id){document.getElementById(id).classList.add('show')}
document.querySelectorAll('.modal-close,.btn[data-close]').forEach(b=>b.onclick=()=>closeModal(b.dataset.close||b.closest('.modal-overlay').id));

// Category modal
document.querySelectorAll('.color-opt').forEach(o=>o.onclick=function(){document.querySelectorAll('.color-opt').forEach(c=>c.classList.remove('selected'));this.classList.add('selected')});
document.getElementById('btnConfirmCategory').onclick=()=>{
  const name=document.getElementById('categoryName').value.trim();if(!name)return;
  const color=document.querySelector('.color-opt.selected')?.dataset.color||'blue';
  const id=document.getElementById('editingCategoryId').value;
  if(id){const cat=state.categories.find(c=>c.id===id);if(cat){cat.name=name;cat.color=color}}
  else{state.categories.push({id:'cat_'+Date.now(),name,color})}
  saveState();closeModal('addCategoryModal');renderTabs();renderApps();notify(id?'分类已保存':'分类已创建');
};
function openCatModal(data=null){
  document.getElementById('catModalTitle').textContent=data?'📝 编辑分类':'✨ 新建分类';
  document.getElementById('categoryName').value=data?data.name:'';
  document.getElementById('editingCategoryId').value=data?data.id:'';
  document.getElementById('btnConfirmCategory').textContent=data?'保存':'创建';
  document.querySelectorAll('.color-opt').forEach(o=>o.classList.toggle('selected',data?o.dataset.color===data.color:o.classList.contains('selected')));
  openModal('addCategoryModal');
}

// Settings
document.getElementById('btnSettings').onclick=()=>{
  document.getElementById('settingViewMode').value=state.viewMode;document.getElementById('settingSortBy').value=state.sortBy;
  openModal('settingsModal');
};
document.getElementById('btnSaveSettings').onclick=()=>{
  state.viewMode=document.getElementById('settingViewMode').value;state.sortBy=document.getElementById('settingSortBy').value;
  saveState();closeModal('settingsModal');updateViewMode();renderApps();notify('设置已保存');
};
document.getElementById('btnClearData').onclick=()=>{
  if(confirm('⚠️ 确定清除所有数据？此操作不可恢复！')){localStorage.removeItem('macDokerState');state.apps=[];state.categories=[...DEFAULT_CATS];state.activeCategory='all';saveState();renderTabs();renderApps();notify('数据已清除')}
};

// ====== Edit App ======
function editApp(name){
  const app=state.apps.find(a=>a.name===name);if(!app)return;
  const opts=state.categories.filter(c=>!c.isSystem).map(c=>`<option value="${c.id}" ${c.id===app.category?'selected':''}>${c.name}</option>`).join('');
  const m=document.createElement('div');m.className='modal-overlay show';m.innerHTML=`<div class="modal" style="width:400px"><div class="modal-header"><h2>📝 编辑应用</h2><button class="modal-close" data-close>×</button></div><div class="modal-body"><div class="setting-group"><label class="setting-label">应用名称</label><input type="text" class="setting-input" id="editName" value="${app.name}"></div><div class="setting-group"><label class="setting-label">所属分类</label><select class="setting-select" id="editCat">${opts}</select></div></div><div class="modal-footer"><button class="btn btn-danger" id="btnDel">🗑️ 移除</button><button class="btn" data-close>取消</button><button class="btn btn-primary" id="btnSave">保存</button></div></div>`;
  document.body.appendChild(m);
  m.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>m.remove());
  m.querySelector('#btnSave').onclick=()=>{const n=document.getElementById('editName').value.trim(),c=document.getElementById('editCat').value;if(n)app.name=n;app.category=c;saveState();m.remove();renderTabs();renderApps();notify('已保存')};
  m.querySelector('#btnDel').onclick=()=>{if(confirm(`确定移除 "${name}"？`)){state.apps=state.apps.filter(a=>a.name!==name);saveState();m.remove();renderTabs();renderApps();notify('已移除')}};
  m.addEventListener('click',e=>{if(e.target===m)m.remove()});
}

// ====== Search ======
const searchBox=document.getElementById('searchBox'),searchInput=document.getElementById('searchInput'),searchClear=document.getElementById('searchClear');
searchInput.addEventListener('input',e=>{state.searchQuery=e.target.value;searchBox.classList.toggle('has-value',!!e.target.value);renderApps()});
searchClear.onclick=()=>{searchInput.value='';state.searchQuery='';searchBox.classList.remove('has-value');renderApps();searchInput.focus()};

// ====== Sort ======
document.querySelectorAll('.sort-btn').forEach(b=>b.onclick=function(){state.sortBy=this.dataset.sort;saveState();document.querySelectorAll('.sort-btn').forEach(x=>x.classList.toggle('active',x===this));renderApps()});

// ====== View Mode ======
function updateViewMode(){document.getElementById('appGrid').className='app-grid'+(state.viewMode!=='default'?' view-'+state.viewMode:'')}
document.querySelectorAll('.view-btn').forEach(b=>b.onclick=function(){state.viewMode=this.dataset.view;saveState();document.querySelectorAll('.view-btn').forEach(x=>x.classList.toggle('active',x===this));updateViewMode()});

// ====== Refresh ======
document.getElementById('btnScanApps').onclick=()=>{scanApps().then(()=>{renderTabs();renderApps()})};

// ====== Keyboard ======
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&!e.target.matches('input,textarea,select')){e.preventDefault();searchInput.focus()}
  if(e.key==='Escape'){document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'))}
});
if(API){API.onFocusSearch(()=>searchInput.focus());API.onRefreshApps(()=>{scanApps().then(()=>{renderTabs();renderApps()})})}

// ====== Init ======
loadState();
if(!state.categories.length)state.categories=[...DEFAULT_CATS];
if(!state.apps.length){scanApps().then(()=>{renderTabs();renderApps()})}
else{renderTabs();renderApps()}
</script>
</body>
</html>
